name: Container image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.compute.outputs.image_ref }}
      image_tag: ${{ steps.compute.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute image coordinates
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          image_tag="sha-${GITHUB_SHA::7}"
          image_ref="ghcr.io/go-go-golems/glazed:${image_tag}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (Go runtime)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/go-go-golems/glazed
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Docker metadata (SSR sidecar)
        id: meta_ssr
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/go-go-golems/glazed-ssr
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push Go runtime
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=glazed-runtime
          cache-to: type=gha,mode=max,scope=glazed-runtime

      - name: Build and push SSR sidecar
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ssr
          push: true
          tags: ${{ steps.meta_ssr.outputs.tags }}
          labels: ${{ steps.meta_ssr.outputs.labels }}
          cache-from: type=gha,scope=glazed-ssr
          cache-to: type=gha,mode=max,scope=glazed-ssr


  gitops-pr:
    name: Open docs-yolo GitOps PR
    needs: build-and-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check out infra-tooling repository
        uses: actions/checkout@v7
        with:
          repository: go-go-golems/infra-tooling
          ref: main
          path: .infra-tooling

      - name: Read GitHub App credentials from Vault
        uses: hashicorp/vault-action@v4
        with:
          url: https://vault.yolo.scapegoat.dev
          method: jwt
          path: github-actions
          role: glazed-gitops-pr
          jwtGithubAudience: https://vault.yolo.scapegoat.dev
          exportToken: true
          secrets: |
            kv/data/ci/github/glazed/gitops-pr-app app_id | GITOPS_APP_ID ;
            kv/data/ci/github/glazed/gitops-pr-app private_key | GITOPS_APP_PRIVATE_KEY

      - name: Mint GitHub App token for GitOps repository
        id: gitops-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.GITOPS_APP_ID }}
          private-key: ${{ env.GITOPS_APP_PRIVATE_KEY }}
          owner: wesen
          repositories: 2026-03-27--hetzner-k3s

      - name: Export GitHub App token for GitOps action
        shell: bash
        run: |
          echo "GITOPS_PR_TOKEN=${{ steps.gitops-app-token.outputs.token }}" >> "$GITHUB_ENV"
          echo "::add-mask::${{ steps.gitops-app-token.outputs.token }}"

      - name: Open GitOps pull request for docs-yolo image bump
        uses: ./.infra-tooling/actions/open-gitops-pr
        with:
          config: deploy/gitops-targets.json
          image: ${{ needs.build-and-push.outputs.image_ref }}
          all_targets: true
          push: true
          open_pr: true
          git_author_name: github-actions[bot]
          git_author_email: 41898282+github-actions[bot]@users.noreply.github.com
