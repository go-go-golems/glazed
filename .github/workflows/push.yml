name: golang-pipeline

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.19.5'
          cache: true
      -
        name: Check generated logcopter package loggers
        run: go tool logcopter-gen -area-prefix go-go-golems.glazed -strip-prefix github.com/go-go-golems/glazed -check ./pkg/...
      -
        name: Run unit tests
        run: go test ./...
